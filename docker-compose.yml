version: "3.9"

services:
  # ── LiveKit Server (dev/local mode) ──────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"   # WebSocket
      - "7881:7881"   # RTC TCP
      - "7882:7882/udp" # RTC UDP
    environment:
      - LIVEKIT_KEYS=devkey:secret

  # ── FastAPI — token + KB + prompt endpoints ───────────────────────────────
  api:
    build:
      context: ./backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - nd_data:/app/data
    env_file:
      - ./backend/.env
    depends_on:
      - livekit

  # ── LiveKit Agent Worker ─────────────────────────────────────────────────
  agent:
    build:
      context: ./backend
    command: python agent.py start
    volumes:
      - nd_data:/app/data
    env_file:
      - ./backend/.env
    depends_on:
      - livekit
      - api

  # ── React Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  nd_data:
